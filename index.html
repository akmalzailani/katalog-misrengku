<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISRENGKU - Katalog Produk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #dc143c, #b22222);
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 30px;
            border-radius: 0 0 20px 20px;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-banner {
            width: 100%;
            height: 250px;
            background-color: #b22222;
            border-radius: 15px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* foto banner tampil penuh */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .filter-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #dc143c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .filter-btn:hover {
            background-color: #b22222;
        }

        .sort-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .sort-section select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: contain;        /* foto tampil penuh, tidak terpotong */
            background-color: #f9f9f9;  /* background abu terang agar rapi */
            padding: 8px;

        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #dc143c;
            margin-bottom: 10px;
        }

        .product-description {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #2c3e50;
            color: white;
            border-radius: 20px;
            margin-top: 30px;
        }

        footer p {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        footer .contact-info {
            font-size: 0.9rem;
            color: #ecf0f1;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2rem;
            }

            .catalog-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .product-card {
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8rem;
            }

            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .filter-section {
                flex-direction: column;
                align-items: center;
            }

            .sort-section {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>MISRENGKU</h1>
        <p>Katalog Produk Makanan Khas Bandung</p>
    </header>

    <div class="container">
        <div class="hero-banner">
            <img src="images/WhatsApp Image 2026-04-15 at 09.58.20.jpeg" alt="Banner Produk">
        </div>

        <div class="filter-section">
            <button class="filter-btn" onclick="filterProducts('all')">Semua Produk</button>
            <button class="filter-btn" onclick="filterProducts('basreng')">Basreng</button>
            <button class="filter-btn" onclick="filterProducts('rengginang')">Rengginang</button>
            <button class="filter-btn" onclick="filterProducts('paket')">Paket Hemat</button>
        </div>

        <div class="sort-section">
            <select id="sortSelect" onchange="sortProducts()">
                <option value="default">Urutkan: Default</option>
                <option value="harga-asc">Harga: Murah ke Mahal</option>
                <option value="harga-desc">Harga: Mahal ke Murah</option>
            </select>
        </div>

        <div class="catalog-grid" id="productGrid">
            <!-- Produk akan dimuat secara dinamis oleh JavaScript -->
        </div>
    </div>

    <footer>
        <p>Hubungi Kami</p>
        <div class="contact-info">
            <p>📞 +62 857-3151-5462</p>
            <p>📍 Bandung, Indonesia</p>
            <p>Copyright © 2026 MISRENGKU </p>
        </div>
    </footer>
    
    <script>
        // Data produk
        const products = [
            {
                id: 1,
                name: "Kerupuk Basreng Large",
                price: 35000,
                description: "Kerupuk basreng ukuran besar dengan rasa gurih dan renyah",
                image: "images/WhatsApp Image 2026-04-15 at 09.58.23.jpeg"
            },
            {
                id: 2,
                name: "Rengginang 500 gram",
                price: 33000,
                description: "Rengginang premium 500 gram, renyah dan gurih",
                image: "images/WhatsApp Image 2026-04-15 at 10.02.49.jpeg"
            },
            {
                id: 3,
                name: "Basreng Goreng",
                price: 12000,
                description: "Basreng goreng dengan rasa yang lezat dan renyah",
                image: "images/WhatsApp Image 2026-04-15 at 10.29.47.jpeg"
            },
            {
                id: 4,
                name: "Keripik Kulit Lumpia",
                price: 15000,
                description: "Keripik kulit lumpia yang renyah dan gurih",
                image: "images/WhatsApp Image 2026-04-15 at 10.29.49.jpeg"
            },
            {
                id: 5,
                name: "Makaroni Bantet",
                price: 15000,
                description: "Makaroni bantet dengan rasa yang lezat",
                image: "images/WhatsApp Image 2026-04-15 at 10.13.19.jpeg"
            },
            {
                id: 6,
                name: "Basreng Bantet",
                price: 15000,
                description: "Basreng bantet dengan rasa yang lezat",
                image: "images/WhatsApp Image 2026-04-15 at 10.13.20.jpeg"
            },
            {
                id: 7,
                name: "Kerupuk Basreng Medium",
                price: 22000,
                description: "Kerupuk basreng ukuran medium dengan rasa gurih",
                image: "images/WhatsApp Image 2026-04-15 at 09.58.18.jpeg"
            },
            {
                id: 8,
                name: "Rengginang 1 Kg",
                price: 60000,
                description: "Rengginang 1 kg, cocok untuk keluarga",
                image: "images/WhatsApp Image 2026-04-15 at 10.02.49.jpeg"
            },
            {
                id: 9,
                name: "Paket Hemat Indomie",
                price: 32000,
                description: "Paket hemat berisi indomie, kerupuk basreng dan teh pucuk",
                image: "images/WhatsApp Image 2026-04-15 at 09.58.24.jpeg"
            },
            {
                id: 10,
                name: "Paket Hemat Nasi Kuning",
                price: 33000,
                description: "Paket hemat berisi nasi kuning, kerupuk basreng dan air mineral",
                image: "images/WhatsApp Image 2026-04-15 at 09.58.25.jpeg"
            }
        ];

        // Fungsi untuk memuat produk ke grid
        function loadProducts() {
            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">Rp ${product.price.toLocaleString()}</p>
                        <p class="product-description">${product.description}</p>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        // Fungsi untuk filter produk
        function filterProducts(category) {
            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = '';

            let filteredProducts = products;

            if (category !== 'all') {
                filteredProducts = products.filter(product => {
                    if (category === 'basreng') {
                        return product.name.toLowerCase().includes('basreng');
                    } else if (category === 'rengginang') {
                        return product.name.toLowerCase().includes('rengginang');
                    } else if (category === 'paket') {
                        return product.name.toLowerCase().includes('paket');
                    }
                    return true;
                });
            }

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">Rp ${product.price.toLocaleString()}</p>
                        <p class="product-description">${product.description}</p>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        // Fungsi untuk sortir produk
        function sortProducts() {
            const sortValue = document.getElementById('sortSelect').value;
            let sortedProducts = [...products];

            if (sortValue === 'harga-asc') {
                sortedProducts.sort((a, b) => a.price - b.price);
            } else if (sortValue === 'harga-desc') {
                sortedProducts.sort((a, b) => b.price - a.price);
            }

            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = '';

            sortedProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">Rp ${product.price.toLocaleString()}</p>
                        <p class="product-description">${product.description}</p>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        // Load produk saat halaman dimuat
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
